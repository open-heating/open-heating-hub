listener 1883
protocol mqtt

listener 9001
protocol websockets

# No authentication by default (suitable for local network)
# To add auth, uncomment below and run:
#   docker exec oh-mosquitto mosquitto_passwd -c /mosquitto/config/passwd admin
#
# password_file /mosquitto/config/passwd
# allow_anonymous false

allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
