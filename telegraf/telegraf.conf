[agent]
  interval = "10s"
  flush_interval = "10s"

# Read from MQTT
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "open-heating/circuit/+/temperature",
    "open-heating/circuit/+/setpoint",
    "open-heating/circuit/+/valve_position",
    "open-heating/outdoor/temperature",
    "open-heating/status"
  ]
  data_format = "value"
  data_type = "float"

  # Extract circuit number from topic
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "open-heating/circuit/+/+"
    tags = "_/_/circuit/measurement"
    fields = ""

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "open-heating/outdoor/+"
    tags = "_/location/measurement"
    fields = ""

# Write to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "open-heating-token"
  organization = "open-heating"
  bucket = "heating"
